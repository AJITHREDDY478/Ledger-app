<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Book background -->
  <rect x="6" y="6" width="52" height="52" rx="10" fill="#0f766e"/>
  <!-- Book spine line -->
  <line x1="22" y1="10" x2="22" y2="54" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Ledger lines -->
  <line x1="28" y1="20" x2="52" y2="20" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="29" x2="52" y2="29" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="38" x2="52" y2="38" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Coin symbol -->
  <circle cx="14" cy="44" r="6" fill="#ffffff" opacity="0.2"/>
  <text x="14" y="48" text-anchor="middle" font-size="9" fill="#ffffff" font-family="sans-serif" font-weight="bold">₹</text>
</svg>
